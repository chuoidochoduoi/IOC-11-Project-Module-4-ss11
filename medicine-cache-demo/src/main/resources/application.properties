spring.application.name=medicine-cache-demo

# ===============================
# Cấu hình Database PostgreSQL
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/medicinedb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# Cấu hình Redis Cache
# ===============================
# Kết nối Redis (Redis làm Cache Provider)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8

# ===============================
# Cấu hình Spring Cache
# ===============================
# Cache manager sử dụng Redis
spring.cache.type=redis
spring.cache.redis.time-to-live=1800000
# TTL 30 phút = 1800000ms

# ===============================
# Logging để quan sát Cache-aside
# ===============================
logging.level.org.springframework.cache=DEBUG
logging.level.org.springframework.data.redis=DEBUG
logging.level.org.example.medicinecachedemo=INFO
